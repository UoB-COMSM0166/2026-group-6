<!DOCTYPE html>
<html lang="">

<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>purifying pollution and ecological restoration</title>
   <style>
      body {
         padding: 0;
         margin: 0;
         background-color: #1b1b1b;
      }

   /* 页面布局 */
      #layout{
         max-height:100vh;
         display:flex;
         justify-content:center;
         align-items:flex-start;
         gap:10px;
         padding-top:40px;
   
      }

      #game-container{
         width:1000px;
         height:700px;

         transform: scale(0.75);
         transform-origin: top center;
      }

      /* canvas */
      #game-container canvas{
         display:block;
      }

      /* 右侧 Controls UI */
      #controls-ui{
         width:220px;
         padding:15px;
         border-radius:12px;
         background:rgba(30,30,40,0.9);
         color:white;
         font-family:sans-serif;

         display:none;   /* 默认隐藏 */
      }

      /* 每一行 */
      .row{
         margin:6px 0;
      }

      /* 按键样式 */
      .key{
         display:inline-block;
         width:40px;
         text-align:center;
         background:#444;
         border-radius:5px;
         margin-right:6px;
      }
   </style>

   <!-- p5.js -->
   <script src="p5.js"></script>
   <script src="p5.sound.js"></script>

   <!-- 第1层: 配置 + 工具 (零依赖) -->
   <script src="game-project/config/config.js"></script>
   <script src="game-project/assist/key.js"></script>
   <script src="game-project/assist/physics.js"></script>

   <!-- 第2层: 数据类 -->
   <script src="game-project/tile.js"></script>
   <script src="game-project/particle.js"></script>

   <!-- 第3层: 游戏对象 (依赖 config + physics) -->
   <script src="game-project/rope/rope.js"></script>
   <script src="game-project/entity.js"></script>
   <script src="game-project/entity/GateWall.js"></script>
   <script src="game-project/entity/Button.js"></script>
   <script src="game-project/entity/Tool.js"></script>
   <script src="game-project/entity/PollutionCore.js"></script>
   <script src="game-project/entity/CleanEnergy.js"></script>
   <script src="game-project/entity/Rest.js"></script>
   <script src="game-project/entity/Ladder.js"></script>
   <script src="game-project/entity/Painting.js"></script>
   <script src="game-project/entity/TeleportationGate.js"></script>
   <script src="game-project/entity/EndingButton.js"></script>
   <script src="game-project/entity/enemy.js"></script>
   <script src="game-project/entity/ToxicBullet.js"></script>
   <script src="game-project/entity/Boss.js"></script>
   <script src="game-project/player.js"></script>

   <!-- 第4层: 管理器 (依赖游戏对象) -->
   <script src="game-project/camera.js"></script>
   <script src="game-project/ui.js"></script>
   <script src="game-project/introui.js"></script>
   <script src="game-project/resource-manager.js"></script>
   <script src="game-project/level-manager.js"></script>
   <script src="game-project/game-manager.js"></script>

   <!-- 第5层: 入口 (依赖以上全部) -->
   <script src="game-project/main.js"></script>
</head>

<body>

<div id="layout">

  <!-- 游戏canvas放这里 -->
  <div id="game-container"></div>

  <!-- 右侧Controls UI -->
  <div id="controls-ui">
    <h3>Controls</h3>

    <div class="row"><span class="key">W</span> Up</div>
    <div class="row"><span class="key">A</span> Left</div>
    <div class="row"><span class="key">S</span> Down</div>
    <div class="row"><span class="key">D</span> Right</div>

    <div class="row"><span class="key">T</span> Change Rope</div>
    <div class="row"><span class="key">E</span> Prolong Rope</div>
    <div class="row"><span class="key">C</span> Shorten Rope</div>

    <div class="row"><span class="key">M</span> Map</div>
    <div class="row"><span class="key">H</span> Help</div>
    <div class="row"><span class="key">F</span> Interact</div>

    <p>Left Click: Firm Rope</p>
    <p>Right Click: Soft Rope</p>
  </div>

</div>

</body>

</html>
